<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#171f29" media="(prefers-color-scheme: dark)" />
  <title>null.do — today's pause</title>
  <meta name="description" content="一个会呼吸的单页。让心安静下来。" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://api.sunrise-sunset.org" />
  <link rel="preconnect" href="https://ipwho.is" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400;500&display=block" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Inter:wght@300;400;500&display=block" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="breath"></div>
  <div class="halo"></div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <header class="tiny solar" aria-label="sun progress">
    <canvas id="solarCanvas" width="64" height="32"></canvas>
    <div class="meta">
      <strong id="solarLabel">loading</strong>
      <span id="solarTimes">--:-- / --:--</span>
    </div>
  </header>

  <main class="center">
    <p id="line" class="line">先不用解决所有事。</p>
  </main>

  <footer class="tiny clock" aria-label="local time">
    <strong id="time">00:00</strong>
    <span id="date">Mon</span>
  </footer>

  <script src="./content.js"></script>
  <script src="./app.js"></script>
  <script>
    // 检测字体加载完成后再显示文字，避免闪烁
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        document.documentElement.classList.add('fonts-loaded');
      });
    } else {
      // 后备方案：延迟显示
      setTimeout(() => {
        document.documentElement.classList.add('fonts-loaded');
      }, 300);
    }
  </script>
</body>
</html>
